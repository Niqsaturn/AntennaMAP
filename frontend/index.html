<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AntennaMAP Starter</title>
  <link href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" rel="stylesheet" />
  <link href="./styles.css" rel="stylesheet" />
</head>
<body>
  <div id="map"></div>
  <aside class="panel">
    <h1>AntennaMAP Starter</h1>
    <p class="muted">Miramar pilot · informational RF metadata only</p>
    <label><input id="infraToggle" type="checkbox" checked> Infrastructure</label>
    <label><input id="estToggle" type="checkbox" checked> Estimated emitters</label>
    <label><input id="rayToggle" type="checkbox" checked> Directional Rays</label>
    <label><input id="sectorToggle" type="checkbox" checked> Sector Polygons</label>
    <label><input id="confidenceToggle" type="checkbox" checked> Confidence Ellipses</label>
    <label for="timeRange">Time cutoff</label>
    <input id="timeRange" type="range" min="0" max="100" value="100" />
    <div id="timeLabel" class="muted"></div>
    <label for="propModel">Propagation model</label>
    <select id="propModel">
      <option value="fspl">FSPL</option>
      <option value="hata_urban">Hata (Urban)</option>
      <option value="hata_suburban">Hata (Suburban)</option>
    </select>
    <label for="modelSelect">Inference model</label>
    <select id="modelSelect">
      <option value="">— None —</option>
    </select>
    <div id="loopStatus" class="loop-status">Loop: loading...</div>
    <div id="sdrStatus" class="loop-status">SDR: loading...</div>
    <div id="details" class="details">Click markers for metadata.</div>
  </aside>
  <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
